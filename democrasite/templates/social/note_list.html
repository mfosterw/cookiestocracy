{% extends "social/base.html" %}

{% block sub_title %}
  Notes
{% endblock sub_title %}

{% block social_content %}
  <div class="list-group">
    <div class="row justify-content-center">
      {% for note in note_list %}
        <div class="list-group-item col-8">{% include "social/snippets/note.html" %}</div>
      {% empty %}
        <div class="text-center">
          <h5 class="mb-1">{{ empty_message|default:"No notes available" }}</h5>
        </div>
      {% endfor %}
    </div>
  </div>
{% endblock social_content %}
